<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>我的书架</title>
<style>
body{
    font-family:sans-serif;
    max-width:800px;
    margin:auto;
    padding:20px;
}
.book{
    padding:10px;
    margin:10px 0;
    border:1px solid #ddd;
}
a{
    text-decoration:none;
}
</style>
</head>
<body>

<h1>📚 我的书架</h1>

<div id="books"></div>

<script>

fetch("books.json")
.then(r => r.json())
.then(books => {

    const container =
        document.getElementById("books");

    books.forEach(book => {

        const div =
            document.createElement("div");

        div.className = "book";

        div.innerHTML = `
            <a href="reader.html?book=${encodeURIComponent(book.path)}">
                ${book.name}
            </a>
        `;

        container.appendChild(div);
    });

});

</script>

</body>
</html>
