<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>reader</title>

<script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>

<style>
html,body{
    width:100%;
    height:100%;
    margin:0;
}

#viewer{
    width:100%;
    height:100%;
}
</style>
</head>

<body>

<div id="viewer"></div>

<script>

const params = new URLSearchParams(location.search);
const file = params.get("book");

console.log("file=", file);

const book = ePub(file);

book.ready.then(() => {
    console.log("BOOK READY");
}).catch(e => {
    console.error("BOOK READY ERROR", e);
});

const rendition = book.renderTo("viewer", {
    width:"100%",
    height:"100%"
});

rendition.display()
.then(() => {
    console.log("DISPLAY SUCCESS");
})
.catch(err => {
    console.error("DISPLAY FAILED", err);
});

window.book = book;
window.rendition = rendition;

</script>

</body>
</html>
