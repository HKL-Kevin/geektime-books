<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>阅读器</title>

<script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
}

#viewer{
    width:100%;
    height:100%;
}
</style>

</head>

<body>

<div id="viewer"></div>

<script>

const params =
    new URLSearchParams(location.search);

const bookFile =
    params.get("book");

if(!bookFile){
    alert("未指定书籍");
}

const book =
    ePub(bookFile);

const rendition =
    book.renderTo("viewer",{
        width:"100%",
        height:"100%"
    });

rendition.display();

</script>

</body>
</html>
