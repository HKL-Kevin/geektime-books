<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>阅读器</title>

<script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

<style>
html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
}

#viewer{
    position:fixed;
    left:0;
    top:0;
    right:0;
    bottom:0;
}
</style>
</head>

<body>

<div id="viewer"></div>

<script>

const params = new URLSearchParams(location.search);
const bookFile = params.get("book");

console.log("book:", bookFile);

const book = ePub(bookFile);

const rendition = book.renderTo("viewer", {
    width: "100%",
    height: "100%"
});

book.ready.then(() => {
    console.log("book ready");
});

rendition.on("rendered", (section) => {
    console.log("rendered:", section.href);
});

rendition.display()
    .then(() => {
        console.log("display ok");
    })
    .catch(err => {
        console.error("display error:", err);
    });

</script>

</body>
</html>
